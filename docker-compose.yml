services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      backend:
        condition: service_healthy
